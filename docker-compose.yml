services:
  wiim-remote:
    # Prebuilt multi-arch image (amd64 + arm64) -- no build toolchain needed.
    image: ghcr.io/gthibo/wiim-universal-remote:latest
    # To build from source instead, comment out `image:` above and uncomment:
    # build: .
    container_name: wiim-remote
    restart: unless-stopped
    env_file: .env
    ports:
      # The remote routes are open by default (LAN-trust) -- anything that can
      # reach this port can control the device. Keep it on the LAN, or set
      # REMOTE_TOKEN in .env before exposing it anywhere wider.
      - "39447:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

# Stateless: no volume, no database. Devices are addressed by LAN IP in the
# URL, so there is nothing to persist -- recreate the container freely.
