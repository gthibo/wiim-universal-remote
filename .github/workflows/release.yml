name: Release

# Triggered by pushing a version tag, e.g. `./scripts/release.sh patch`.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub release
  packages: write # push the image to GHCR

env:
  IMAGE: ghcr.io/gthibo/wiim-dashboard

jobs:
  docker:
    name: Build & push image (amd64 + arm64)
    runs-on: ubuntu-latest
    env:
      # Optional Docker Hub mirror: set repo secrets DOCKERHUB_USERNAME +
      # DOCKERHUB_TOKEN to ALSO publish to docker.io. Leave them unset and the
      # release publishes to GHCR only (the Docker Hub steps below no-op).
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub (optional mirror)
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # GHCR always; Docker Hub line is blank (ignored) unless the secret is set.
          images: |
            ${{ env.IMAGE }}
            ${{ env.DOCKERHUB_TOKEN != '' && 'docker.io/mrthibsog/wiim-dashboard' || '' }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog section for this tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; next }
            /^## \[/ { if (flag) exit }
            flag { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "----- extracted release notes for $VERSION -----"
          cat RELEASE_NOTES.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          # The changelog section is the body; GitHub's auto notes are appended.
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
